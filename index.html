<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manualitats — Recursos</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #f8f7f4;
    color: #333;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: linear-gradient(135deg, #ff6b6b, #ffa600, #ffd93d, #6bcb77, #4d96ff, #9b59b6);
    background-size: 300% 300%;
    animation: gradientShift 8s ease infinite;
    padding: 1rem 1.5rem;
    color: white;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    flex-shrink: 0;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  header h1 { font-size: 1.5rem; }
  header p { font-size: 0.85rem; opacity: 0.9; margin-top: 0.2rem; }

  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: #fff;
    border-right: 1px solid #e0e0e0;
    overflow-y: auto;
    padding: 1rem 0.75rem;
    flex-shrink: 0;
  }

  .sidebar-section {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #999;
    margin: 1rem 0 0.4rem 0.25rem;
    font-weight: 600;
  }

  .sidebar button {
    display: block;
    width: 100%;
    padding: 0.6rem 0.75rem;
    margin-bottom: 0.35rem;
    border: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 500;
    color: white;
    cursor: pointer;
    text-align: left;
    transition: transform 0.15s, box-shadow 0.15s;
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }

  .sidebar button:hover {
    transform: scale(1.03);
    box-shadow: 0 3px 12px rgba(0,0,0,0.15);
  }

  .sidebar button.active {
    transform: scale(1.03);
    box-shadow: 0 3px 12px rgba(0,0,0,0.25);
    outline: 3px solid rgba(255,255,255,0.6);
    outline-offset: -3px;
  }

  .btn-perfil {
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    font-size: 0.95rem !important;
    padding: 0.75rem !important;
    text-align: center !important;
  }

  .btn-topics {
    background: linear-gradient(135deg, #6c5ce7, #a55eea);
  }

  .sidebar hr {
    border: none;
    border-top: 1px solid #eee;
    margin: 0.75rem 0;
  }

  /* Content */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 2rem;
    max-width: 900px;
  }

  .content h1 { font-size: 1.8rem; margin-bottom: 0.75rem; color: #2d3436; }
  .content h2 { font-size: 1.4rem; margin: 1.5rem 0 0.5rem; color: #6c5ce7; border-bottom: 2px solid #f0f0f0; padding-bottom: 0.3rem; }
  .content h3 { font-size: 1.15rem; margin: 1.2rem 0 0.4rem; color: #e17055; }
  .content h4 { font-size: 1rem; margin: 1rem 0 0.3rem; color: #636e72; }

  .content p { line-height: 1.7; margin-bottom: 0.8rem; }

  .content a {
    color: #4d96ff;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }
  .content a:hover { border-bottom-color: #4d96ff; }

  .content ul, .content ol { margin: 0.5rem 0 1rem 1.5rem; line-height: 1.8; }
  .content li { margin-bottom: 0.15rem; }

  .content hr { border: none; border-top: 2px solid #f0f0f0; margin: 1.5rem 0; }

  .content code {
    background: #f1f2f6;
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    font-size: 0.9em;
  }

  .content blockquote {
    border-left: 4px solid #6bcb77;
    padding: 0.5rem 1rem;
    margin: 1rem 0;
    background: #f0fff4;
    border-radius: 0 8px 8px 0;
  }

  .content em { color: #636e72; }

  .content strong { color: #2d3436; }

  /* Checkbox styling for topics.md */
  .content input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border: 2px solid #ddd;
    border-radius: 4px;
    vertical-align: middle;
    margin-right: 0.3rem;
    position: relative;
    cursor: default;
  }

  .content input[type="checkbox"]:checked {
    background: linear-gradient(135deg, #6bcb77, #4d96ff);
    border-color: #6bcb77;
  }

  .content input[type="checkbox"]:checked::after {
    content: '\2713';
    color: white;
    font-size: 13px;
    position: absolute;
    top: -1px;
    left: 2px;
  }

  /* Score badges */
  .score-5 { color: #e17055; font-weight: 700; }
  .score-4 { color: #6c5ce7; font-weight: 600; }
  .score-3 { color: #636e72; }

  /* Welcome state */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    color: #999;
  }
  .welcome .emoji { font-size: 4rem; margin-bottom: 1rem; }
  .welcome p { font-size: 1.1rem; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 3rem;
    color: #999;
  }

  /* Mobile toggle */
  .menu-toggle {
    display: none;
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 100;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #ff6b6b, #4d96ff);
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.25);
  }

  /* Mobile */
  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      z-index: 90;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      box-shadow: 4px 0 20px rgba(0,0,0,0.15);
    }

    .sidebar.open { transform: translateX(0); }

    .menu-toggle { display: block; }

    .content { padding: 1.25rem; }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 80;
    }
    .overlay.show { display: block; }
  }
</style>
</head>
<body>

<header>
  <h1>Manualitats — Recursos</h1>
  <p>Navegador de recursos de manualitats per categories</p>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="content" id="content">
    <div class="welcome">
      <div class="emoji">&#127912;</div>
      <p>Tria una categoria del men&uacute; per comen&ccedil;ar</p>
    </div>
  </main>
</div>

<div class="overlay" id="overlay"></div>
<button class="menu-toggle" id="menuToggle">&#9776;</button>

<script>
const FILES = [
  { file: 'perfil.md', label: 'Perfil Creatiu', type: 'special' },
  { file: 'topics.md', label: 'Tots els Topics', type: 'special' },
  { file: '01_paper_cartro.md', label: '01 Paper / Cartr\u00f3' },
  { file: '02_textil_fils.md', label: '02 T\u00e8xtil / Fils' },
  { file: '03_joieria_bisuteria.md', label: '03 Joieria / Bisuteria' },
  { file: '04_pintura_dibuix.md', label: '04 Pintura / Dibuix' },
  { file: '05_modelat_escultura.md', label: '05 Modelat / Escultura' },
  { file: '06_a_10_altres.md', label: '06-10 Cer\u00e0mica, Vidre...' },
  { file: '11_natura_eco.md', label: '11 Natura / Eco' },
  { file: '12_resina.md', label: '12 Resina / Epoxi' },
  { file: '13_reciclatge.md', label: '13 Reciclatge Creatiu' },
  { file: '14_decoracio.md', label: '14 Decoraci\u00f3 / Llar' },
  { file: '16_21_24_altres.md', label: '16-21-24 Foto, Mini...' },
  { file: '17_moda.md', label: '17 Moda / Cosplay' },
  { file: '18_tecnologia.md', label: '18 Tecnologia' },
  { file: '25_festivitats.md', label: '25 Festivitats' },
  { file: '26_mixed_media.md', label: '26 Mixed Media' },
];

const COLORS = [
  '#ff6b6b', '#ff9f43', '#feca57', '#48dbfb', '#ff6348',
  '#6bcb77', '#4d96ff', '#9b59b6', '#e17055', '#00cec9',
  '#fd79a8', '#636e72', '#a29bfe', '#55efc4', '#fab1a0',
];

const sidebar = document.getElementById('sidebar');
const content = document.getElementById('content');
const overlay = document.getElementById('overlay');
const menuToggle = document.getElementById('menuToggle');

let activeBtn = null;

// Configure marked
marked.use({
  gfm: true,
  breaks: true,
});

// Build sidebar
function buildSidebar() {
  // Perfil button
  const perfil = FILES[0];
  const btnPerfil = document.createElement('button');
  btnPerfil.className = 'btn-perfil';
  btnPerfil.textContent = '\u2728 ' + perfil.label;
  btnPerfil.onclick = () => loadFile(perfil.file, btnPerfil);
  sidebar.appendChild(btnPerfil);

  // Topics button
  const topics = FILES[1];
  const btnTopics = document.createElement('button');
  btnTopics.className = 'btn-topics';
  btnTopics.textContent = '\ud83d\udcca ' + topics.label;
  btnTopics.onclick = () => loadFile(topics.file, btnTopics);
  sidebar.appendChild(btnTopics);

  // Separator
  sidebar.appendChild(document.createElement('hr'));

  const sectionLabel = document.createElement('div');
  sectionLabel.className = 'sidebar-section';
  sectionLabel.textContent = 'Categories';
  sidebar.appendChild(sectionLabel);

  // Category buttons
  FILES.slice(2).forEach((item, i) => {
    const btn = document.createElement('button');
    const color = COLORS[i % COLORS.length];
    const lightColor = color + '33';
    btn.style.background = `linear-gradient(135deg, ${color}, ${adjustColor(color, -30)})`;
    btn.textContent = item.label;
    btn.onclick = () => loadFile(item.file, btn);
    sidebar.appendChild(btn);
  });
}

function adjustColor(hex, amount) {
  const num = parseInt(hex.slice(1), 16);
  const r = Math.min(255, Math.max(0, (num >> 16) + amount));
  const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
  const b = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
  return '#' + (0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1);
}

async function loadFile(file, btn) {
  // Update active state
  if (activeBtn) activeBtn.classList.remove('active');
  btn.classList.add('active');
  activeBtn = btn;

  // Close mobile menu
  closeMobileMenu();

  content.innerHTML = '<div class="loading">Carregant...</div>';

  try {
    const resp = await fetch(file);
    if (!resp.ok) throw new Error('No s\'ha pogut carregar ' + file);
    const text = await resp.text();
    const html = marked.parse(text);
    content.innerHTML = html;

    // Open all links in new tab
    content.querySelectorAll('a').forEach(a => {
      if (a.href && !a.href.startsWith('javascript')) {
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
      }
    });

    // Style score badges in topics
    if (file === 'topics.md') {
      styleScores();
    }

    // Scroll to top
    content.scrollTop = 0;
  } catch (err) {
    content.innerHTML = '<div class="loading">Error: ' + err.message + '</div>';
  }
}

function styleScores() {
  content.querySelectorAll('em').forEach(em => {
    const match = em.textContent.match(/puntuaci[oó]:(\d)/);
    if (match) {
      const score = parseInt(match[1]);
      if (score >= 5) em.className = 'score-5';
      else if (score >= 4) em.className = 'score-4';
      else if (score <= 2) em.style.opacity = '0.5';
    }
  });
}

// Mobile menu
function closeMobileMenu() {
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
}

menuToggle.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
});

overlay.addEventListener('click', closeMobileMenu);

// Init
buildSidebar();
</script>
</body>
</html>
